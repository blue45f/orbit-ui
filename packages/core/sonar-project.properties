sonar.projectName=orbit-ui-core
sonar.projectKey=orbit-ui-core
sonar.projectBaseDir=packages/foundation
sonar.sources=src
sonar.test=src/**/*.test.*
sonar.inclusions=src/**/*.ts, src/**/*.tsx
sonar.exclusions=node_modules, **/*.css.ts, **/*.stories.tsx

sonar.test.inclusions=src/**/*.test.*
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
sonar.language=ts
sonar.verbose=false
sonar.qualitygate.wait=true
