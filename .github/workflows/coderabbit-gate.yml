name: CodeRabbit 리뷰 게이트

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed, edited]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: coderabbit-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  coderabbit-gate:
    name: CodeRabbit 리뷰 통과
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: 리뷰 상태 확인
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "PR #$PR_NUMBER 의 CodeRabbit 리뷰 상태를 확인합니다."

          pr_user=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.user.login')
          echo "PR 작성자: $pr_user"

          if [ "$pr_user" = "dependabot[bot]" ]; then
            echo "✅ dependabot PR은 CodeRabbit 리뷰 게이트를 자동 통과합니다."
            exit 0
          fi

          reviews=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate \
            --jq '[.[] | select(.user.login | ascii_downcase | test("coderabbit"))]')

          count=$(echo "$reviews" | jq 'length')

          if [ "$count" -eq 0 ]; then
            echo "::error title=CodeRabbit 리뷰 누락::CodeRabbit이 아직 PR을 리뷰하지 않았습니다."
            echo ""
            echo "다음 중 하나를 시도하세요:"
            echo "  1. PR 코멘트에 @coderabbitai review 를 입력해 즉시 리뷰 트리거"
            echo "  2. 새 커밋을 push 해 자동 리뷰 재실행"
            echo "  3. PR이 draft 상태라면 'Ready for review' 로 변경"
            exit 1
          fi

          latest=$(echo "$reviews" | jq 'sort_by(.submitted_at) | last')
          state=$(echo "$latest" | jq -r '.state')
          submitted_at=$(echo "$latest" | jq -r '.submitted_at')
          html_url=$(echo "$latest" | jq -r '.html_url')

          echo "마지막 CodeRabbit 리뷰: state=$state, submitted_at=$submitted_at"
          echo "리뷰 링크: $html_url"

          case "$state" in
            APPROVED)
              echo "✅ CodeRabbit이 PR을 승인했습니다. 게이트 통과."
              exit 0
              ;;
            CHANGES_REQUESTED)
              echo "::error title=CodeRabbit 변경 요청::CodeRabbit이 변경을 요청했습니다. 리뷰 코멘트를 확인하고 수정 후 다시 push 해 주세요."
              echo "리뷰 링크: $html_url"
              exit 1
              ;;
            COMMENTED)
              echo "::error title=CodeRabbit 코멘트만 작성::CodeRabbit이 코멘트만 남겼고 명시적인 승인이 없습니다. @coderabbitai review 로 재리뷰를 요청하거나 추가 push 로 트리거하세요."
              exit 1
              ;;
            DISMISSED)
              echo "::error title=리뷰 dismiss::CodeRabbit 리뷰가 dismiss 되었습니다. 새 커밋을 push 해 재리뷰를 트리거하세요."
              exit 1
              ;;
            *)
              echo "::error title=알 수 없는 리뷰 상태::CodeRabbit 리뷰 상태가 미정입니다 (state=$state)."
              exit 1
              ;;
          esac
