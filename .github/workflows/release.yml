name: 릴리스

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    name: 릴리스
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: CI/CD 통과 여부 확인
        run: |
          echo "워크플로우: ${{ github.event.workflow_run.name }}"
          echo "이벤트: ${{ github.event.workflow_run.event }}"
          echo "브랜치: ${{ github.event.workflow_run.head_branch }}"
          echo "결과: ${{ github.event.workflow_run.conclusion }}"
          echo "상태: ${{ github.event.workflow_run.status }}"

          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "CI가 성공하지 않아 릴리스를 중단합니다."
            exit 1
          fi

          if [ "${{ github.event.workflow_run.status }}" != "completed" ]; then
            echo "CI가 완료되지 않아 릴리스를 중단합니다."
            exit 1
          fi

      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: pnpm 설정
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 빌드
        run: pnpm build

      - name: 테스트
        run: pnpm test

      - name: 릴리스 PR 생성 또는 배포
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version
          commit: 'chore: 버전 업데이트'
          title: 'chore: 버전 업데이트'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
