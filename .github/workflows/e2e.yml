name: E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (시나리오 + 비주얼)
    runs-on: ubuntu-latest
    # Run inside the exact Playwright image used to generate the committed visual
    # baselines. ubuntu-latest's own font stack renders ~1% of pixels differently,
    # so pinning the image makes CI pixel-identical to the baselines (deterministic).
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    timeout-minutes: 30

    steps:
      - name: 체크아웃
        uses: actions/checkout@v6

      - name: pnpm 설정
        uses: pnpm/action-setup@v6

      - name: Node.js 설정
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 패키지 빌드
        run: pnpm -r build

      - name: Storybook 빌드
        working-directory: packages/theme-eclipse
        run: pnpm build:storybook

      # Browsers are pre-installed in the mcr.microsoft.com/playwright image.

      - name: Playwright 실행
        working-directory: packages/theme-eclipse
        run: pnpm test:e2e

      - name: 실패 시 리포트 업로드
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: packages/theme-eclipse/playwright-report
          retention-days: 14

      - name: 실패 시 비주얼 diff 업로드
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: packages/theme-eclipse/test-results
          retention-days: 14
