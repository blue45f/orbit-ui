name: E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (시나리오 + 비주얼)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설정
        uses: pnpm/action-setup@v6
        with:
          version: 9.14.4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 패키지 빌드
        run: pnpm -r build

      - name: Storybook 빌드
        working-directory: packages/theme-eclipse
        run: pnpm build:storybook

      - name: Playwright 브라우저 설치
        working-directory: packages/theme-eclipse
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Playwright 실행
        working-directory: packages/theme-eclipse
        run: pnpm test:e2e

      - name: 실패 시 리포트 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/theme-eclipse/playwright-report
          retention-days: 14

      - name: 실패 시 비주얼 diff 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: packages/theme-eclipse/test-results
          retention-days: 14
