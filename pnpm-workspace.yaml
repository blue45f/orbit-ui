packages:
  - 'apps/*'
  - 'packages/*'
  - 'config/*'

# Workspace catalog: 단일 진실 공급원으로 버전을 통일합니다.
# 패키지에서 "catalog:"로 참조하면 여기 값이 사용됩니다.
catalog:
  # React 19.2
  react: ^19.2.6
  react-dom: ^19.2.6
  '@types/react': ^19.2.15
  '@types/react-dom': ^19.2.0

  # 타입스크립트 & 노드
  typescript: ^6.0.3
  '@types/node': ^25.9.1

  # 빌드/테스트 툴체인
  vite: ^8.0.14
  vitest: ^4.1.7
  '@vitest/coverage-v8': ^4.1.7
  '@vitest/ui': ^4.1.7
  '@vitejs/plugin-react-swc': ^4.3.1
  jsdom: ^29.1.1

  # 테스팅 라이브러리
  '@testing-library/dom': ^10.4.1
  '@testing-library/jest-dom': ^6.9.1
  '@testing-library/react': ^16.3.2
  '@testing-library/user-event': ^14.6.1
